<div class="rounded-lg mx-3 my-5 p-4 w-64 h-38 flex flex-col justify-between border-2" [class.neon-green]="!cours().archive" [class.neon-red]="cours().archive">
    <div>
        <p class="text-violet-500 text-sm my-1">{{cours().code}}</p>
        <p class="text-blue-100 my-2">{{cours().titre}}</p>
    </div>
    
    <div class="flex items-center">
        <button class="border-2 border-blue-400 text-blue-400 hover:bg-blue-400/20 transition-colors text-sm p-1 mr-1 rounded-md" [routerLink]="['/cours', cours().id]">Détails</button>
        @if(cours().archive) {
            <button class="border-2 border-red-400 text-red-400 text-sm p-1 ml-1 rounded-md hover:bg-red-400/20 transition-colors" (click)="supprimerCours()">Supprimer</button>
            <button class="text-blue-100 border-2 border-blue-100 hover:bg-blue-100/20 transition-colors p-1.5 mx-2 rounded-md flex items-center justify-center" (click)="actionArchiver()">
                <ng-icon name="heroArrowPath" size="16" />
            </button>
        }
        @else {
            <button class="border-2 border-red-400 text-red-400 text-sm p-1 ml-1 rounded-md hover:bg-red-400/10 transition-colors" (click)="actionArchiver()">Archiver</button>            
        }
        
    </div>
</div>

@if (afficherModal()) {    

  <app-modal-confirmation
    titre="Supprimer le cours"
    [message]="'Êtes-vous sûr de vouloir supprimer ' + cours().titre + ' ? Attention cette action est irréversible. Si des évaluations sont associées, elles seront également supprimées'"
    labelConfirmer="Supprimer"
    (confirmer)="onConfirmerSuppression()"
    (annuler)="afficherModal.set(false)"
  />
}

@if (afficherModalArchive()) {
    <app-modal-confirmation
    [titre]="cours().archive ? 'Restaurer le cours' : 'Archiver le cours'"
    [message]="cours().archive ? 'Êtes-vous sûr de vouloir restaurer ' + cours().titre + ' ? ': 'Êtes-vous sûr de vouloir archiver ' + cours().titre + ' ? '"
    [labelConfirmer]="cours().archive ? 'Restaurer' : 'Archiver'"
    (confirmer)="onConfirmerArchive()"
    (annuler)="afficherModalArchive.set(false)"
    [danger]="false"
  />
}
