<div class="w-2/3 mx-auto">
    <div class="flex justify-between">
        <h1 class="text-blue-100 m-4 text-2xl">Mes cours</h1>
        <button class="p-2 border-2 border-emerald-400 text-emerald-400 hover:bg-emerald-400/20 rounded-md m-4" (click)="changerAffichage()">
            {{afficherFormulaire() ? 'Annuler' : 'Nouveau cours' }} 
        </button>    
    </div>

    @if(afficherFormulaire()) {
        <app-cours-formulaire-component (coursCree)="refreshCours()" />        
    }
    

    @if (listeCours.isLoading()) {
        <app-chargement/>
    }

    @if (listeCours.error()) {
    <p class="text-red-500">Erreur de chargement</p>
    }

    <div class="flex flex-wrap">
    @for (cours of listeCours.value()?.data ?? []; track cours.id) {
        <app-cours-carte (coursModif)="reloadCours()" [cours]="cours"></app-cours-carte>
    }
    </div>        
</div>
