<div class="rounded-lg mx-3 my-5 p-4 border-2 border-blue-100">
    <div class="flex justify-between mb-2">
        <h2 class="text-blue-100 text-3xl">{{critere().titre}}</h2>
        <p class="text-blue-100 text-3xl">{{points()}} points</p>
    </div>
    <p class="text-blue-100">{{critere().description}}</p>
    <div class="flex justify-end">
        <button (click)="modifierCritere()" class="border-2 border-blue-400 text-blue-400 text-sm px-2 py-1 mx-1 rounded-md hover:bg-blue-400/10 transition-colors flex items-center gap-1">
            <ng-icon name="heroPencilSquare" size="18"></ng-icon>
        </button>
        <button (click)="modifierCritere()" class="border-2 border-red-400 text-red-400 text-sm px-2 py-1 mx-1 rounded-md hover:bg-red-400/10 transition-colors flex items-center gap-1">
            <ng-icon name="heroTrash" size="18"></ng-icon>
        </button>
    </div>
</div>
