<!-- Backdrop -->
<div class="fixed inset-0 bg-black/60 z-40 flex items-center justify-center"
     (click)="annuler.emit()">

  <!-- Modal — stopPropagation pour éviter la fermeture au clic intérieur -->
  <div class="bg-(--form-bg) border-2 rounded-lg p-6 w-full max-w-md z-50 mx-4" [class.neon-red]="danger()" [class.neon-blue]="!danger()"
       (click)="$event.stopPropagation()">

    <h2 class="text-blue-100 text-xl font-semibold mb-2">{{ titre() }}</h2>
    <p class="text-blue-100/70 mb-6">{{ message() }}</p>

    <div class="flex justify-end gap-3">
      <button
        class="border-2 border-blue-100 hover:bg-blue-100/10 transition-colors text-blue-100 px-4 py-2 rounded-md text-sm"
        (click)="annuler.emit()">
        {{ labelAnnuler() }}
      </button>
      <button
        class="px-4 py-2 rounded-md text-sm border-2 transition-colors"
        [class.border-red-400]="danger()"
        [class.text-red-400]="danger()"
        [class.hover:bg-red-400/10]="danger()"
        [class.border-blue-400]="!danger()"
        [class.text-blue-400]="!danger()"
        [class.hover:bg-blue-400/10]="!danger()"
        (click)="confirmer.emit()">
        {{ labelConfirmer() }}
      </button>
    </div>
 
  </div>
</div>
